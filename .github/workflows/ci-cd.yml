name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/larocquemb/brownrook-idc

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: make test

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: larocquemb
          password: ${{ secrets.CR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/larocquemb/brownrook-idc:latest
            ghcr.io/larocquemb/brownrook-idc:${{ github.sha }}

  update-infra:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check out infra repo
        uses: actions/checkout@v4
        with:
          repository: larocquemb/brownrook-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: brownrook-infra

      - name: Update deployment image tag
        run: |
          cd brownrook-infra
          sed -i "s|image: ghcr.io/larocquemb/brownrook-idc:.*|image: ghcr.io/larocquemb/brownrook-idc:${GITHUB_SHA}|" \
            kubernetes/platform/idc/20-deployment.yaml

      - name: Commit and push infra change
        run: |
          cd brownrook-infra
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kubernetes/platform/idc/20-deployment.yaml
          git commit -m "deploy brownrook-idc ${GITHUB_SHA}" || exit 0
          git push
